<style>
  /* ----- PRINT-READY OVERRIDES ----- */
  html, body {
    background: var(--canvas) !important;
    padding-top: 0 !important;
  }

  /* Nav: not useful in print. Hide. */
  .tb-nav { display: none !important; }

  /* Trim large vertical paddings so sections breathe without leaving giant gaps */
  .tb-hero,
  .tb-services,
  .tb-belief,
  .tb-trust,
  .tb-manifesto,
  .tb-heritage,
  .tb-founder,
  .tb-open,
  .tb-faq,
  .tb-notes,
  .tb-offices,
  .tb-ctawrap,
  .tb-contact,
  .tb-prose,
  .tb-twocol,
  .tb-numerals,
  .tb-steps,
  .tb-sectors,
  .tb-compare,
  .tb-experience,
  .tb-profile,
  .tb-speaker,
  .tb-interlude {
    padding-top: 56px !important;
    padding-bottom: 56px !important;
  }
  .tb-hero { padding-top: 80px !important; }
  .tb-manifesto, .tb-founder, .tb-open { padding-top: 72px !important; padding-bottom: 72px !important; }

  /* Force backgrounds + colours to print */
  body, body * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* Disable interactivity affordances */
  .tb-service:hover { background: inherit !important; }
  .tb-service.is-featured:hover { background: var(--hairline) !important; }

  /* FAQ, force every answer panel open in print */
  .tb-faq__item .tb-faq__a {
    max-height: none !important;
    padding: 0 0 var(--space-lg) !important;
  }
  .tb-faq__sign { display: none !important; }
  .tb-faq__q { cursor: default !important; }

  /* Hero, keep the airy display but allow it to share a printed page sensibly */
  .tb-hero__title { font-size: 56px !important; }
  .tb-hero__sub { font-size: 17px !important; }

  /* Break-before for big visual section starters */
  @media print {
    @page { size: A4; margin: 14mm; }
    body { padding-top: 0 !important; }

    .tb-founder,
    .tb-services,
    .tb-faq,
    .tb-notes,
    .tb-ctawrap {
      break-before: page !important;
    }

    /* Keep section heads together with their content */
    .tb-services__head,
    .tb-heritage__head,
    .tb-faq__head,
    .tb-notes__head,
    .tb-sectionhead { break-after: avoid !important; }

    /* Don't let cards split */
    .tb-service,
    .tb-trust__cell,
    .tb-heritage__cell,
    .tb-numeral,
    .tb-step,
    .tb-sector,
    .tb-economy,
    .tb-note,
    .tb-faq__item,
    .tb-compare__row,
    .tb-ladder__row,
    .tb-experience__list li,
    .tb-office {
      break-inside: avoid !important;
    }

    /* Dark sections: keep them readable on paper */
    .tb-founder, .tb-open, .tb-interlude, .tb-speaker, .tb-cta, .tb-footer {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Drop the heavy outer hero overlays in print to avoid muddy paper */
    .tb-hero::before { opacity: 0.55 !important; }
    .tb-hero::after { background: linear-gradient(180deg, rgba(250,248,242,0.40) 0%, rgba(250,248,242,0.75) 80%) !important; }

    /* Buttons in print: they don't click, keep them visually as labels */
    .btn:hover { transform: none !important; }
  }
</style>
