// Live availability calendar. Pure-client demo: deterministic availability
// derived from the date so slots stay stable on reload but feel real.
const CAL_MONTH_NAMES = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"];


// Six daily consult slots, in 24h time.
const CAL_SLOTS = [
  { t: "09:30", label: "09:30" },
  { t: "10:30", label: "10:30" },
  { t: "11:30", label: "11:30" },
  { t: "14:00", label: "14:00" },
  { t: "15:00", label: "15:00" },
  { t: "16:00", label: "16:00" }];


// Cheap deterministic hash → integer.
function calHash(y, m, d) {
  let h = (y * 73856093) ^ ((m + 1) * 19349663) ^ (d * 83492791);
  h = (h ^ h >>> 13) >>> 0;
  return h;
}

// Singapore public holidays (MOM-gazetted), keyed "YYYY-M-D" with month 0-indexed.
// Observed in-lieu Mondays are included; the practice is closed on these days.
const SG_HOLIDAYS = {
  // 2026
  "2026-0-1":  "New Year's Day",
  "2026-1-17": "Chinese New Year",
  "2026-1-18": "Chinese New Year",
  "2026-2-21": "Hari Raya Puasa",
  "2026-3-3":  "Good Friday",
  "2026-4-1":  "Labour Day",
  "2026-4-27": "Hari Raya Haji",
  "2026-4-31": "Vesak Day",          // 31 May (Sun)
  "2026-5-1":  "Vesak Day (observed)",
  "2026-7-9":  "National Day",       // 9 Aug (Sun)
  "2026-7-10": "National Day (observed)",
  "2026-10-8": "Deepavali",          // 8 Nov (Sun)
  "2026-10-9": "Deepavali (observed)",
  "2026-11-25":"Christmas Day",
  // 2027 (fixed-date holidays; lunar/Islamic dates gazetted nearer the time)
  "2027-0-1":  "New Year's Day",
  "2027-3-1":  "Labour Day",
  "2027-7-9":  "National Day",
  "2027-11-25":"Christmas Day"
};

function calHolidayName(date) {
  return SG_HOLIDAYS[date.getFullYear() + "-" + date.getMonth() + "-" + date.getDate()] || null;
}

// Availability classification for a calendar cell.
//  → "past" | "holiday" | "today-closed" | "today-open" | "weekend" | "unavailable" | "open"
function calStatus(date, today) {
  const startToday = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const isToday = date.getTime() === startToday.getTime();
  if (date < startToday) return "past";
  if (calHolidayName(date)) return "holiday";
  const dow = date.getDay(); // 0=Sun, 6=Sat
  if (dow === 0 || dow === 6) return isToday ? "today-closed" : "weekend";

  const h = calHash(date.getFullYear(), date.getMonth(), date.getDate());
  // ~28% of weekdays are fully booked out.
  const unavailable = h % 100 < 28;
  if (isToday) return unavailable ? "today-closed" : "today-open";
  return unavailable ? "unavailable" : "open";
}

// Which of the six slots are already booked for a given date.
function calBookedSlots(date) {
  const h = calHash(date.getFullYear(), date.getMonth(), date.getDate());
  const booked = new Set();
  // Two to four slots booked per open day, deterministic by date.
  const count = 2 + h % 3;
  for (let i = 0; i < count; i++) {
    booked.add((h >> i * 3 & 7) % CAL_SLOTS.length);
  }
  return booked;
}

function MiniCal() {
  const today = useMemo(() => new Date(), []);
  const startToday = useMemo(
    () => new Date(today.getFullYear(), today.getMonth(), today.getDate()),
    [today]);

  const [view, setView] = useState(() => ({ y: today.getFullYear(), m: today.getMonth() }));
  const [picked, setPicked] = useState(null); // {y,m,d} | null

  // Don't allow paging into the past, or more than 3 months ahead
  // (current month + the next three).
  const minIndex = today.getFullYear() * 12 + today.getMonth();
  const maxIndex = minIndex + 3;
  const viewIndex = view.y * 12 + view.m;
  const canPrev = viewIndex > minIndex;
  const canNext = viewIndex < maxIndex;
  const step = (delta) => {
    const next = viewIndex + delta;
    if (next < minIndex || next > maxIndex) return;
    setView({ y: Math.floor(next / 12), m: next % 12 });
  };

  // Build grid cells: 1-indexed weekday Mon..Sun = 0..6.
  const firstDow = (new Date(view.y, view.m, 1).getDay() + 6) % 7; // shift Sun=0 → Mon=0
  const daysInMonth = new Date(view.y, view.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push({ kind: "empty", key: "e" + i });
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(view.y, view.m, d);
    cells.push({ kind: "day", d, date, status: calStatus(date, today), key: "d" + d });
  }
  // Pad to full weeks for nicer alignment.
  while (cells.length % 7 !== 0) cells.push({ kind: "empty", key: "t" + cells.length });

  const isPickedCell = (c) =>
  picked && c.kind === "day" &&
  picked.y === view.y && picked.m === view.m && picked.d === c.d;

  const onDayClick = (c) => {
    if (c.status !== "open" && c.status !== "today-open") return;
    setPicked({ y: view.y, m: view.m, d: c.d });
  };

  // Slot panel state.
  const pickedDate = picked ? new Date(picked.y, picked.m, picked.d) : null;
  const booked = pickedDate ? calBookedSlots(pickedDate) : null;
  const longDate = pickedDate ?
  pickedDate.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" }) :
  "";

  const slotMailto = (slot) => {
    const dateStr = pickedDate.toLocaleDateString("en-GB", {
      weekday: "long", day: "numeric", month: "long", year: "numeric"
    });
    const subj = encodeURIComponent(`Consultation request, ${dateStr} at ${slot.label}`);
    const body = encodeURIComponent(
      `Dear 2birds,\n\nI should like to reserve the ${slot.label} slot on ${dateStr} for a complimentary consultation.\n\nMy enquiry concerns:\n\n\nKind regards,\n`);

    return `mailto:hello@2birds.asia?subject=${subj}&body=${body}`;
  };

  return (
    <div className="tb-cal">
      <div className="tb-cal__head">
        <span className="tb-cal__month">{CAL_MONTH_NAMES[view.m]} <em>{view.y}</em></span>
        <span className="tb-cal__nav">
          <button
            className="tb-cal__navbtn"
            aria-label="Previous month"
            onClick={() => step(-1)}
            disabled={!canPrev}
            style={{ opacity: canPrev ? 1 : 0.3, cursor: canPrev ? "pointer" : "not-allowed" }}>
            ‹
          </button>
          <button
            className="tb-cal__navbtn"
            aria-label="Next month"
            onClick={() => step(1)}
            disabled={!canNext}
            style={{ opacity: canNext ? 1 : 0.3, cursor: canNext ? "pointer" : "not-allowed" }}>
            ›
          </button>
        </span>
      </div>
      <div className="tb-cal__week">
        <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
      </div>
      <div className="tb-cal__grid">
        {cells.map((c) => {
          if (c.kind === "empty") {
            return <button key={c.key} className="tb-cal__day is-empty" disabled aria-label=""></button>;
          }
          const label = c.date.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
          const holidayName = c.status === "holiday" ? calHolidayName(c.date) : null;
          let cls = "tb-cal__day";
          let disabled = true;
          if (c.status === "past") cls += " is-past";else
          if (c.status === "holiday") cls += " is-holiday";else
          if (c.status === "weekend") {/* default muted */}else
          if (c.status === "unavailable") cls += " is-unavailable";else
          if (c.status === "today-open") {cls += " is-today is-open";disabled = false;}else
          if (c.status === "today-closed") cls += " is-today";else
          if (c.status === "open") {cls += " is-open";disabled = false;}
          if (isPickedCell(c)) cls += " is-selected";
          return (
            <button
              key={c.key}
              className={cls}
              disabled={disabled}
              title={holidayName ? holidayName + " · public holiday" : undefined}
              aria-label={label + (holidayName ? ", " + holidayName + ", public holiday, closed" : c.status === "open" || c.status === "today-open" ? ", available" : "")}
              aria-pressed={isPickedCell(c) || undefined}
              onClick={() => onDayClick(c)}>

              {c.d}
            </button>);

        })}
      </div>
      <div className="tb-cal__legend">
        <span className="tb-cal__legitem"><span className="tb-cal__sw tb-cal__sw--open"></span><span>Open</span></span>
        <span className="tb-cal__legitem"><span className="tb-cal__sw tb-cal__sw--today"></span><span>Today</span></span>
        <span className="tb-cal__legitem"><span className="tb-cal__sw tb-cal__sw--picked"></span><span>Unavailable</span></span>
        <span className="tb-cal__legitem"><span className="tb-cal__sw tb-cal__sw--holiday"></span><span>Public holiday</span></span>
      </div>

      {picked &&
      <div className="tb-cal__slots">
          <div className="tb-cal__slots-head">
            <span>{longDate}</span>
            <em>Singapore time</em>
          </div>
          <div className="tb-cal__slots-grid">
            {CAL_SLOTS.map((s, i) => {
            const isBooked = booked.has(i);
            return isBooked ?
            <span key={s.t} className="tb-cal__slot is-booked" aria-disabled="true">
                  {s.label}
                </span> :

            <a key={s.t} className="tb-cal__slot" href={slotMailto(s)}>
                  {s.label}
                </a>;

          })}
          </div>
          <p className="tb-cal__slots-foot">
            Reserving an hour opens an engagement correspondence. The practice confirms by return of email, ordinarily within two working days.
          </p>
        </div>
      }
    </div>);

}

<script>
/* Service-card video: lazy-load and play on hover, pause and reset on leave.
   Gracefully shows the poster image when the video file is not present. */
(function initServiceVideos() {
  function wire() {
    document.querySelectorAll('.tb-service').forEach(function (card) {
      if (card.dataset.vidWired) return;
      var video = card.querySelector('.tb-service__video');
      if (!video) return;
      card.dataset.vidWired = "1";
      var src = video.getAttribute('data-src');
      function ensureSrc() {
        if (src && video.dataset.ready === "1" && !video.getAttribute('src')) {
          video.setAttribute('src', src);
        }
      }
      card.addEventListener('mouseenter', function () {
        ensureSrc();
        var p = video.play();
        if (p && p.catch) p.catch(function () {});
      });
      card.addEventListener('mouseleave', function () {
        try { video.pause(); video.currentTime = 0; } catch (e) {}
      });
    });
  }
  wire();
  setTimeout(wire, 200);
  setTimeout(wire, 1000);
})();

/* Cinematic banner: load src and autoplay (muted) once present. */
(function initFilmstrip() {
  function go() {
    var v = document.querySelector('.tb-filmstrip__video');
    if (!v || v.dataset.fsWired) return;
    v.dataset.fsWired = "1";
    var src = v.getAttribute('data-src');
    if (src && v.dataset.ready === "1") {
      v.setAttribute('src', src);
      var p = v.play();
      if (p && p.catch) p.catch(function () {});
    }
  }
  go();
  setTimeout(go, 300);
  setTimeout(go, 1200);
})();
</script>
