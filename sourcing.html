// Per-sector floating cursor badge, follows the mouse over the sectors grid
function SectorsCursor({ gridRef, sectors }) {
  const [state, setState] = React.useState({ visible: false, x: 0, y: 0, icon: null, label: "" });

  React.useEffect(() => {
    const grid = gridRef.current;
    if (!grid) return;
    const tiles = Array.from(grid.querySelectorAll(".tb-sector"));
    const handlers = [];

    const onMove = (e, sector) => {
      const rect = grid.getBoundingClientRect();
      setState({ visible: true, x: e.clientX - rect.left, y: e.clientY - rect.top, icon: sector.icon, label: sector.title });
    };
    const onLeave = () => setState((s) => ({ ...s, visible: false }));

    tiles.forEach((tile, i) => {
      const sector = sectors[i];
      const move = (e) => onMove(e, sector);
      tile.addEventListener("mousemove", move);
      tile.addEventListener("mouseleave", onLeave);
      handlers.push([tile, move]);
    });
    return () => {
      handlers.forEach(([tile, move]) => {
        tile.removeEventListener("mousemove", move);
        tile.removeEventListener("mouseleave", onLeave);
      });
    };
  }, [gridRef, sectors]);

  return (
    <div
      className={"tb-sectors__cursor" + (state.visible ? " is-visible" : "")}
      style={{ transform: `translate(${state.x}px, ${state.y}px) translate(-50%, -50%)` }}
      aria-hidden="true">
      
      <span className="tb-sectors__cursor-ring"></span>
      <svg className="tb-sectors__cursor-icon" viewBox="0 0 24 24" width="26" height="26">
        {state.icon ? SECTOR_ICONS[state.icon] : null}
      </svg>
      <span className="tb-sectors__cursor-label">{state.label}</span>
    </div>);

}

          <div className="tb-join__field tb-join__field--full">

            <div className="tb-join__chips">

          </div>

          <div className="tb-join__field">
            <label className="tb-join__label" htmlFor="join-name">Name</label>
