// Typeahead combobox used for the Training organisation field.
function Combobox({ label, required, value, onChange, placeholder, options = [], maxShown = 10 }) {
  const [focused, setFocused] = useState(false);
  const [open, setOpen] = useState(false);
  const [highlight, setHighlight] = useState(0);
  const inputRef = useRef(null);
  const wrapRef = useRef(null);

  const matches = useMemo(() => {
    const q = (value || "").trim().toLowerCase();
    if (!q) return options.slice(0, maxShown);
    const starts = [],includes = [];
    for (const opt of options) {
      const lo = opt.toLowerCase();
      if (lo.startsWith(q)) starts.push(opt);else
      if (lo.includes(q)) includes.push(opt);
      if (starts.length >= maxShown) break;
    }
    return [...starts, ...includes].slice(0, maxShown);
  }, [value, options, maxShown]);

  useEffect(() => {
    function onDocDown(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false);
    }
    if (open) document.addEventListener("mousedown", onDocDown);
    return () => document.removeEventListener("mousedown", onDocDown);
  }, [open]);

  const choose = (val) => {
    onChange({ target: { value: val } });
    setOpen(false);
    setHighlight(0);
    inputRef.current && inputRef.current.blur();
  };

  const onKeyDown = (e) => {
    if (!open && (e.key === "ArrowDown" || e.key === "ArrowUp")) {setOpen(true);return;}
    if (!open) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      setHighlight((h) => Math.min(h + 1, matches.length - 1));
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      setHighlight((h) => Math.max(h - 1, 0));
    } else if (e.key === "Enter") {
      if (matches[highlight]) {e.preventDefault();choose(matches[highlight]);}
    } else if (e.key === "Escape") {setOpen(false);}
  };

  return (
    <label className="tb-field tb-combo" ref={wrapRef}>
      <span className="tb-field__label">
        {label}
        {required && <em className="tb-field__req"> *</em>}
      </span>
      <div className="tb-combo__wrap">
        <input
          ref={inputRef}
          className={"tb-field__input" + (focused ? " is-focused" : "")}
          type="text"
          value={value}
          onChange={(e) => {onChange(e);setOpen(true);setHighlight(0);}}
          onFocus={() => {setFocused(true);setOpen(true);}}
          onBlur={() => setFocused(false)}
          onKeyDown={onKeyDown}
          placeholder={placeholder}
          autoComplete="off"
          role="combobox"
          aria-expanded={open} />
        
        <span className="tb-combo__caret" aria-hidden="true">
          <svg viewBox="0 0 12 8" width="12" height="8">
            <path d="M1 1l5 5 5-5" fill="none" stroke="currentColor" strokeWidth="1.5"
            strokeLinecap="round" strokeLinejoin="round" />
          </svg>
        </span>
        {open && matches.length > 0 &&
        <ul className="tb-combo__list" role="listbox">
            {matches.map((opt, i) =>
          <li
            key={opt}
            className={"tb-combo__opt" + (i === highlight ? " is-active" : "")}
            role="option"
            aria-selected={i === highlight}
            onMouseDown={(e) => {e.preventDefault();choose(opt);}}
            onMouseEnter={() => setHighlight(i)}>
            
                {opt}
              </li>
          )}
            {value && !options.some((o) => o.toLowerCase() === value.toLowerCase()) &&
          <li className="tb-combo__hint">
                Press <kbd>Enter</kbd> to use “{value}” as your own entry.
              </li>
          }
          </ul>
        }
      </div>
    </label>);

}
